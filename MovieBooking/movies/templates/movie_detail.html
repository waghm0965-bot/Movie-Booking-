<!DOCTYPE html>
<html>

<head>
    <title>{{ movie.title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="/">
                🎬 Movie Booking
            </a>

            <a href="/" class="btn btn-light">
                Home
            </a>

        </div>
    </nav>

    <div class="container mt-4">

        <div class="row">

            <div class="col-md-4">

                {% if movie.poster %}
                <img src="{{ movie.poster.url }}" class="img-fluid rounded shadow">
                {% endif %}

            </div>

            <div class="col-md-8">

                <h1>{{ movie.title }}</h1>

                <p class="mt-3">
                    {{ movie.description }}
                </p>

                <h5>
                    Release Date :
                    {{ movie.release_date }}
                </h5>

            </div>

        </div>

        <hr>

        <h2>🎬 Available Shows</h2>

        {% for show in shows %}

        <div class="card mt-3">

            <div class="card-body">

                <h5>
                    Time : {{ show.show_time }}
                </h5>

                <h5>
                    Price : ₹{{ show.price }}
                </h5>

                <a href="{% url 'select_seat' show.id %}" class="btn btn-success">
                    Select Seats
                </a>

            </div>

        </div>

        {% empty %}

        <p>No Shows Available</p>

        {% endfor %}

    </div>

</body>

</html>

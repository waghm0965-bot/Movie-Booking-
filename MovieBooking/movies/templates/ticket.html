<!DOCTYPE html>
<html>

<head>
    <!DOCTYPE html>

    <html>

    <head>
        <title>Ticket</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    </head>

<body>

    <div class="container mt-5">


        <div class="card shadow p-4">

            <h1 class="text-center">
                🎟️ Movie Ticket
            </h1>
            <h3>
                Booking ID : {{ booking.booking_id }}
            </h3>

            <hr>



            <p>
                <strong>Movie :</strong>
                {{ seat.show.movie.title }}
            </p>

            <p>
                <strong>Seat :</strong>
                {{ seat.seat_number }}
            </p>

            <p>
                <strong>Price :</strong>
                ₹{{ seat.show.price }}
            </p>

            <p>
                <strong>Time :</strong>
                {{ seat.show.show_time }}
            </p>

            <hr>

            <h2 class="text-success">
                Booking Successful ✅
            </h2>

            <br>

            <a href="/my-bookings/" class="btn btn-primary">
                My Bookings
            </a>

            <br><br>

            <a href="/" class="btn btn-secondary">
                Home
            </a>

        </div>
        

    </div>

</body>

</html>
